<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dice Roll Generator</title>
</head>
<body>
    <div class="inputDiceRoll">
        <h1>DICE ROLL GENERATOR</h1>
        <div class="roll_lbl">
            <label for="rollInt"># of Dice: </label>
            <input type="number" id="rollInt" value="1" min="1" max="100">
        </div>
        <button onclick="btnRoll()">Roll Dice</button>
        <div class="display_results"></div>
        <div class="display_images"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
